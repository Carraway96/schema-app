<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schema – Smågrupper</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="conflict-placeholder.png">
  <meta name="color-scheme" content="dark only">
  <style>
    :root { --bg:#0f1115; --panel:#161a22; --text:#e7e9ee; --muted:#9aa3b2; --accent:#4f8cff; --danger:#ff5d5d; --border:#2a3140; --chip:#242b37; --card:#1a202c; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    header{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);background:#0d1016;position:sticky;top:0;z-index:10}
    h1{font-size:18px;margin:0;font-weight:600} .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    button,select,input[type=time],input[type=text],input[type=number],input[type=color],input[type=password]{background:var(--panel);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:10px;font-size:14px}
    button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    button.small{padding:6px 8px;font-size:12px}
    .wrap{display:grid;grid-template-columns:300px 1fr;gap:14px;padding:14px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .col{background:var(--panel);border:1px solid var(--border);border-radius:12px}
    .col header{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)}
    .lessons{padding:10px;display:flex;flex-direction:column;gap:10px;min-height:120px}
    .lesson{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .lesson-head{display:flex;gap:10px;align-items:center;padding:10px 12px;cursor:pointer}
    .subject-chip{padding:4px 8px;border-radius:999px;font-weight:600;font-size:12px;background:var(--chip);border:1px solid var(--border)}
    .timeplace{color:var(--muted);font-size:13px}.grow{flex:1}
    .icon,.conflict-icon{width:18px;height:18px}
    .details{display:none;border-top:1px solid var(--border);padding:8px 12px}
    .student{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed #202839}
    .student:last-child{border-bottom:none}
    .badge{font-size:11px;color:var(--muted);background:#0c1018;border:1px solid var(--border);padding:2px 6px;border-radius:8px}
    .kicker{color:var(--muted);font-size:12px}
    .list{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 260px);overflow:auto}
    .search{width:100%}
    dialog{border:1px solid var(--border);border-radius:12px;background:var(--panel);color:var(--text)}
    dialog[open]{animation:pop .12s ease-out}@keyframes pop{from{transform:scale(.98);opacity:.5}to{transform:scale(1);opacity:1}}
    .form{display:grid;gap:10px;grid-template-columns:1fr 1fr}.full{grid-column:1/-1}
    .table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--border);text-align:left;padding:8px;font-size:13px}
    .note{color:var(--muted);font-size:12px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>Schema – smågrupper</h1>
    <div class="row">
      <button id="btnAddLesson" class="primary">Lägg till lektion</button>
      <button id="btnEditLesson">Redigera lektion</button>
      <button id="btnEditStudent">Redigera elev</button>
      <button id="btnEditColors">Färger</button>
    </div>
    <div class="row">
      <button id="btnPickDB" class="small">Byt databas</button>
      <button id="btnSaveNow" class="small">Spara</button>
      <button id="btnExport" class="small">Exportera</button>
      <button id="btnImport" class="small">Importera</button>
      <label class="kicker">Autospara <input type="checkbox" id="autoSave"></label>
      <button id="btnPassword" class="small">Lösenord</button>
      <button id="btnPDF" class="small">PDF (dagens)</button>
      <div class="kicker" id="lockState">🔓 Oskyddad</div>
    </div>
    <div class="row">
      <div class="kicker">Vecka <span id="weekno">–</span></div>
      <label for="weekday" class="kicker">Veckodag</label>
      <select id="weekday">
        <option value="1">Mån</option><option value="2">Tis</option><option value="3">Ons</option><option value="4">Tor</option><option value="5">Fre</option><option value="6">Lör</option><option value="0">Sön</option>
      </select>
    </div>
  </header>

  <div class="wrap">
    <aside class="panel">
      <h2>Elevlista</h2>
      <input id="search" class="search" placeholder="Sök elev..." />
      <div class="list" id="studentList" style="margin-top:10px;"></div>
      <div class="note" style="margin-top:8px">Konfliktikon (PNG): <input id="conflictIconPicker" type="file" accept="image/png"></div>
      <div class="note">Tips: spara databasen i en delad OneDrive-mapp – lätt att dela mellan PC.</div>
    </aside>

    <main class="grid">
      <section class="col" id="colMix">
        <header><h3>Mix</h3><span id="countMix" class="kicker"></span></header>
        <div id="lessonsMix" class="lessons"></div>
      </section>
      <section class="col" id="colStor">
        <header><h3>Stor klass</h3><span id="countStor" class="kicker"></span></header>
        <div id="lessonsStor" class="lessons"></div>
      </section>
    </main>
  </div>

  <script>
    const dayNames = {0:"Sön",1:"Mån",2:"Tis",3:"Ons",4:"Tor",5:"Fre",6:"Lör"};
    function saveLocal(){ localStorage.setItem('schemaDB', JSON.stringify(DB)); }
    function loadLocal(){ const raw=localStorage.getItem('schemaDB'); if (raw){ try{ DB=JSON.parse(raw);}catch{} } }
    function getTodayKey(d=new Date()){return d.toISOString().slice(0,10);}
    function timeToMinutes(t){const [h,m]=t.split(':').map(Number);return h*60+m;}
    function overlaps(aStart,aEnd,bStart,bEnd){const as=timeToMinutes(aStart),ae=timeToMinutes(aEnd),bs=timeToMinutes(bStart),be=timeToMinutes(bEnd);return Math.max(as,bs)<Math.min(ae,be);}
    function classSort(a,b){return (a.klass-b.klass)||a.name.localeCompare(b.name);}
    function ensureColorForSubject(subject){ if(!DB.subjectColors[subject]){ let hash=0; for(let i=0;i<subject.length;i++) hash=subject.charCodeAt(i)+((hash<<5)-hash); const hue=Math.abs(hash)%360; DB.subjectColors[subject]=`hsl(${hue} 40% 30%)`; } return DB.subjectColors[subject]; }
    function conflictIconURL(){ return DB.settings?.conflictIconDataURL || "conflict-placeholder.png"; }
    function studentsForLesson(lesson){ return DB.students.filter(s => lesson.studentIds.includes(s.id)); }
    function conflictsFor(lesson, student){
      const others = DB.lessons.filter(l => l.day===lesson.day && l.type!==l.type && l.studentIds.includes(student.id));
      const out = [];
      for (const o of others){
        if (overlaps(lesson.start, lesson.end, o.start, o.end)){
          const ls=timeToMinutes(lesson.start), le=timeToMinutes(lesson.end), os=timeToMinutes(o.start), oe=timeToMinutes(o.end);
          if (oe>ls && os<=ls) out.push({kind:"lateFrom", from:o});
          else if (os<le && os>=ls) out.push({kind:"leaveEarlyTo", to:o});
          else out.push({kind:"overlap", other:o});
        }
      }
      return out;
    }
    function studentIsAbsentToday(student){ return (student.absentDates||[]).includes(getTodayKey()); }
    function isoWeekNumber(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const dayNum=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d - yearStart) / 86400000) + 1)/7);}
    function updateLockState(){document.getElementById('lockState').textContent = currentPassword ? "🔒 Krypterad" : "🔓 Oskyddad";}

    let fileHandle=null, autoSave=false, currentPassword=null;
    let DB={version:6, students:[], lessons:[], subjectColors:{}, settings:{conflictIconDataURL:null}};

    function renderAll(){
      const wd = Number(document.getElementById('weekday').value);
      const mix = DB.lessons.filter(l => l.day===wd && l.type==="Mix").sort((a,b)=> timeToMinutes(a.start)-timeToMinutes(b.start));
      const stor = DB.lessons.filter(l => l.day===wd && l.type==="Stor klass").sort((a,b)=> timeToMinutes(a.start)-timeToMinutes(b.start));
      document.getElementById('lessonsMix').innerHTML = ""; document.getElementById('lessonsStor').innerHTML = "";
      document.getElementById('countMix').textContent = mix.length ? `${mix.length} lektioner` : "Inga lektioner";
      document.getElementById('countStor').textContent = stor.length ? `${stor.length} lektioner` : "Inga lektioner";
      for (const l of mix){ document.getElementById('lessonsMix').appendChild(renderLessonCard(l)); }
      for (const l of stor){ document.getElementById('lessonsStor').appendChild(renderLessonCard(l)); }
      renderStudentList();
      document.getElementById('weekno').textContent = String(isoWeekNumber(new Date()));
      saveLocal();
    }
    function renderLessonCard(lesson){
      const el = document.createElement('div'); el.className="lesson";
      const head = document.createElement('div'); head.className="lesson-head";
      const chip = document.createElement('span'); chip.className="subject-chip"; chip.textContent=lesson.subject;
      chip.style.background = ensureColorForSubject(lesson.subject); chip.style.borderColor="rgba(255,255,255,.08)";
      const tp = document.createElement('div'); tp.className="timeplace"; tp.textContent=`${lesson.start}–${lesson.end} • ${lesson.place}`;
      const grow = document.createElement('div'); grow.className="grow";
      const icon = document.createElement('img'); icon.className="conflict-icon hidden"; icon.src=conflictIconURL(); icon.alt="konflikt";
      head.appendChild(chip); head.appendChild(tp); head.appendChild(grow); head.appendChild(icon);
      el.appendChild(head);
      const det = document.createElement('div'); det.className="details";
      let list = studentsForLesson(lesson).filter(s=>!studentIsAbsentToday(s)).sort(classSort);
      let anyConflict=false;
      for (const s of list){
        const row = document.createElement('div'); row.className="student";
        const nm = document.createElement('div'); nm.textContent = s.name;
        const confs = conflictsFor(lesson, s);
        if (confs.length){ anyConflict=true; const ic=document.createElement('img'); ic.src=conflictIconURL(); ic.className="icon"; row.appendChild(ic); }
        const badge = document.createElement('span'); badge.className = "badge"; badge.textContent=`Åk ${s.klass}`;
        row.appendChild(nm); row.appendChild(badge);
        det.appendChild(row);
      }
      if (anyConflict) icon.classList.remove('hidden');
      el.appendChild(det);
      head.addEventListener('click', ()=>{ det.style.display = det.style.display==="block" ? "none" : "block"; });
      return el;
    }
    function renderStudentList(){
      const wrap = document.getElementById('studentList'); wrap.innerHTML="";
      const groups={7:[],8:[],9:[]};
      for (const s of DB.students){ groups[s.klass]=groups[s.klass]||[]; groups[s.klass].push(s); }
      for (const k of [7,8,9]){
        const arr=(groups[k]||[]).sort((a,b)=>a.name.localeCompare(b.name)); if (!arr.length) continue;
        const gl=document.createElement('div'); gl.className="kicker"; gl.textContent=`Årskurs ${k}`; wrap.appendChild(gl);
        for (const s of arr){
          const row=document.createElement('div'); row.className='row';
          const left=document.createElement('div'); left.textContent=s.name;
          const right=document.createElement('div'); right.className='row';
          const cb=document.createElement('input'); cb.type='checkbox'; cb.title='Frånvaro idag'; cb.checked=studentIsAbsentToday(s);
          cb.addEventListener('change', ()=>{ const today=getTodayKey(); s.absentDates=s.absentDates||[]; if (cb.checked){ if (!s.absentDates.includes(today)) s.absentDates.push(today); } else { s.absentDates=s.absentDates.filter(d=>d!==today); } saveDB(); renderAll(); });
          right.appendChild(cb);
          row.appendChild(left); row.appendChild(right);
          if (cb.checked) row.style.opacity=.6;
          wrap.appendChild(row);
        }
      }
      if (!wrap.children.length){ const p=document.createElement('div'); p.className='kicker'; p.textContent='Inga elever.'; wrap.appendChild(p); }
    }

    // File I/O (simplified)
    async function pickDB(){
      try {
        const [handle] = await window.showOpenFilePicker({ types:[{description:"JSON", accept:{"application/json":[".json",".schema.json"]}}], multiple:false });
        fileHandle = handle; await loadFromHandle();
      } catch(e){ console.warn(e); }
    }
    async function loadFromHandle(){
      if (!fileHandle) return;
      if (await fileHandle.queryPermission({mode:'read'})!=='granted'){
        if (await fileHandle.requestPermission({mode:'read'})!=='granted'){ alert("Behörighet nekad."); return; }
      }
      const file = await fileHandle.getFile(); const text = await file.text();
      let obj=null; try { obj=JSON.parse(text); } catch {}
      if (obj && obj.enc){
        let ok=false; while(!ok){ const pwd = prompt("Denna databas är lösenordsskyddad. Ange lösenord:"); if (pwd===null) return; try { DB = await decryptJSON(obj, pwd); currentPassword = pwd; ok=true; } catch{ alert("Fel lösenord."); } }
      } else if (obj){ DB=obj; currentPassword=null; } else { alert("Kunde inte läsa filen."); return; }
      renderAll(); updateLockState();
    }
    async function saveToHandle(){
      if (!fileHandle) return;
      if (await fileHandle.queryPermission({mode:'readwrite'})!=='granted'){
        if (await fileHandle.requestPermission({mode:'readwrite'})!=='granted'){ alert("Behörighet nekad vid skrivning."); return; }
      }
      let data = currentPassword ? JSON.stringify(await encryptJSON(DB,currentPassword),null,2) : JSON.stringify(DB,null,2);
      const w = await fileHandle.createWritable(); await w.write(data); await w.close();
    }
    async function saveDB(triggeredByUser=false){ if ((autoSave||triggeredByUser) && fileHandle) await saveToHandle(); }

    // Crypto helpers
    function strToBuf(str){ return new TextEncoder().encode(str); }
    function bufToB64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
    function b64ToBuf(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
    async function deriveKey(password,salt,iterations=250000){ const keyMaterial=await crypto.subtle.importKey('raw', strToBuf(password), 'PBKDF2', false, ['deriveKey']); return crypto.subtle.deriveKey({name:'PBKDF2',hash:'SHA-256',salt,iterations}, keyMaterial, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']); }
    async function encryptJSON(obj,password){ const salt=crypto.getRandomValues(new Uint8Array(16)); const iv=crypto.getRandomValues(new Uint8Array(12)); const key=await deriveKey(password,salt); const plaintext=strToBuf(JSON.stringify(obj)); const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, plaintext); return {enc:true,ver:1,alg:'AES-GCM',kdf:'PBKDF2',hash:'SHA-256',iterations:250000,salt:bufToB64(salt),iv:bufToB64(iv),ciphertext:bufToB64(ct)}; }
    async function decryptJSON(wrapped,password){ const key=await deriveKey(password,b64ToBuf(wrapped.salt),wrapped.iterations||250000); const ptBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBuf(wrapped.iv)}, key, b64ToBuf(wrapped.ciphertext)); return JSON.parse(new TextDecoder().decode(ptBuf)); }

    // PDF Export
    function dateStr(d=new Date()){
      return d.toLocaleDateString('sv-SE', {weekday:'long', year:'numeric', month:'short', day:'numeric'});
    }
    function makeDayLists(day){
      const mix = DB.lessons.filter(l => l.day===day && l.type==="Mix").sort((a,b)=> timeToMinutes(a.start)-timeToMinutes(b.start));
      const stor = DB.lessons.filter(l => l.day===day && l.type==="Stor klass").sort((a,b)=> timeToMinutes(a.start)-timeToMinutes(b.start));
      return {mix, stor};
    }
    function studentsSortedPresent(lesson){
      return studentsForLesson(lesson).filter(s=>!studentIsAbsentToday(s)).sort(classSort);
    }
    async function exportPDF(){
      try {
        const day = Number(document.getElementById('weekday').value);
        const {mix, stor} = makeDayLists(day);
        const { jsPDF } = window.jspdf || {};
        if (!jsPDF){ window.print(); return; }
        const doc = new jsPDF({ unit:'pt', format:'a4' });
        const W=595, H=842, LM=40, TM=56, RM=40, BM=56; let y=TM;
        const today = new Date();
        const week = (function isoWeekNumber(date){ const d=new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate())); const dayNum=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-dayNum); const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d-yearStart)/86400000)+1)/7); })(today);
        doc.setFont('helvetica','bold'); doc.setFontSize(16);
        doc.text(`Schema – ${dayNames[day]} (${dateStr(today)}) – v.${week}`, LM, y); y += 18;
        doc.setFont('helvetica','normal'); doc.setFontSize(11);
        doc.setTextColor(80);
        function section(title){ doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(0); if (y>H-BM-18){ doc.addPage(); y=TM; } doc.text(title, LM, y); y+=12; doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(30); }
        function addLesson(lesson){
          const line = `${lesson.subject} — ${lesson.start}–${lesson.end} • ${lesson.place}`;
          if (y>H-BM-18){ doc.addPage(); y=TM; }
          doc.setFont('helvetica','bold'); doc.text(line, LM, y); y+=12;
          doc.setFont('helvetica','normal');
          const studs = studentsSortedPresent(lesson);
          let col2x = LM + 260;
          let colBreak = Math.ceil(studs.length/2);
          if (studs.length<=10){ col2x = 0; colBreak = studs.length; }
          for (let i=0;i<studs.length;i++){
            if (y>H-BM-14){ doc.addPage(); y=TM; }
            const s = studs[i];
            const hasConf = conflictsFor(lesson, s).length>0;
            const text = `${hasConf?'⚠ ':''}${s.name} (Åk ${s.klass})`;
            if (i<colBreak){ doc.text(text, LM+12, y); }
            else { if (!col2x) { doc.addPage(); y=TM; col2x=0; colBreak=studs.length; doc.text(text, LM+12, y); } else { doc.text(text, col2x, y); } }
            y+=12;
          }
          y+=4;
        }
        section("Mix");
        if (!mix.length){ doc.text("– Inga lektioner –", LM+8, y); y+=14; }
        for (const l of mix){ addLesson(l); }
        section("Stor klass");
        if (!stor.length){ doc.text("– Inga lektioner –", LM+8, y); y+=14; }
        for (const l of stor){ addLesson(l); }
        doc.setFontSize(9); doc.setTextColor(120);
        const footer = `Genererad ${today.toLocaleString('sv-SE')} • ${location.hostname}`;
        doc.text(footer, LM, H-20);
        const fname = `schema_${new Date().toISOString().slice(0,10)}.pdf`;
        doc.save(fname);
      } catch(e){ alert("Kunde inte skapa PDF. Testar utskrift…"); window.print(); }
    }

    document.getElementById('btnPDF').onclick = ()=> exportPDF();

    // Minimal stubs for required dialogs to avoid errors in this trimmed build
    function openLessonDialog(){ alert('Lektionsdialog ingår i fulla bygget.'); }
    function openPickLesson(){ alert('Redigera-listan ingår i fulla bygget.'); }
    function openStudentDialog(){ alert('Elevdialog ingår i fulla bygget.'); }
    function openColorDialog(){ alert('Färgdialog ingår i fulla bygget.'); }
    function openPasswordDialog(){ alert('Lösenordsdialog ingår i fulla bygget.'); }

    document.getElementById('weekday').onchange = ()=> renderAll();
    document.getElementById('btnPickDB').onclick = ()=> pickDB();
    document.getElementById('btnSaveNow').onclick = ()=> saveDB(true);
    document.getElementById('autoSave').onchange = (e)=>{ autoSave = e.target.checked; };
    document.getElementById('conflictIconPicker').onchange = async (e)=>{ const f=e.target.files?.[0]; if (!f) return; const buf=await f.arrayBuffer(); const b64=btoa(String.fromCharCode(...new Uint8Array(buf))); DB.settings=DB.settings||{}; DB.settings.conflictIconDataURL=`data:image/png;base64,${b64}`; await saveDB(true); renderAll(); };

    async function pickDB(){
      try {
        const [handle] = await window.showOpenFilePicker({ types:[{description:"JSON", accept:{"application/json":[".json",".schema.json"]}}], multiple:false });
        fileHandle = handle; await loadFromHandle();
      } catch(e){ console.warn(e); }
    }
    async function loadFromHandle(){
      if (!fileHandle) return;
      if (await fileHandle.queryPermission({mode:'read'})!=='granted'){
        if (await fileHandle.requestPermission({mode:'read'})!=='granted'){ alert("Behörighet nekad."); return; }
      }
      const file = await fileHandle.getFile(); const text = await file.text();
      try { DB = JSON.parse(text); } catch { alert("Kunde inte läsa filen."); return; }
      renderAll();
    }
    async function saveToHandle(){ if (!fileHandle) return; const w = await fileHandle.createWritable(); await w.write(JSON.stringify(DB,null,2)); await w.close(); }
    async function saveDB(triggeredByUser=false){ if ((autoSave||triggeredByUser) && fileHandle) await saveToHandle(); }

    (async ()=>{
      if ('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }
      const jsDay=(new Date()).getDay(); document.getElementById('weekday').value=String(jsDay===0?1:jsDay===6?5:jsDay);
      loadLocal(); renderAll();
    })();
  </script>
</body>
</html>
